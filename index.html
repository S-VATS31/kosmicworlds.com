<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kosmic Worlds</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #faf7f2;
      --cream-mid: #f2ede4;
      --cream-dark: #e8e0d2;
      --ink: #1a1714;
      --ink-mid: #4a4540;
      --ink-light: #9a9088;
      --accent: #8b7355;
    }

    html, body {
      height: 100%;
      background: var(--cream);
      color: var(--ink);
      font-family: 'Jost', sans-serif;
    }

    /* subtle paper texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(210,195,170,0.3) 0%, transparent 70%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(200,185,160,0.2) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── logo ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      animation: fadeUp 1s 0.05s cubic-bezier(0.16,1,0.3,1) both;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
    }

    .logo-text {
      font-family: 'Inter', sans-serif;
      font-size: 36px;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--ink);
    }

    /* ── thin rule ── */
    .rule {
      width: 32px;
      height: 1px;
      background: var(--cream-dark);
      margin-bottom: 20px;
      animation: fadeUp 1s 0.15s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── coming soon ── */
    .eyebrow {
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--ink-light);
      margin-bottom: 20px;
      animation: fadeUp 1s 0.2s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── headline ── */
    .headline {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 8vw, 52px);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.01em;
      text-align: center;
      color: var(--ink);
      margin-bottom: 24px;
      animation: fadeUp 1s 0.25s cubic-bezier(0.16,1,0.3,1) both;
    }

    .headline em {
      font-style: italic;
      color: var(--accent);
    }

    /* ── description ── */
    .description {
      font-size: 17px;
      font-weight: 300;
      line-height: 1.8;
      color: var(--ink-mid);
      text-align: center;
      max-width: 320px;
      margin-bottom: 48px;
      animation: fadeUp 1s 0.3s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── waitlist ── */
    .waitlist {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
      animation: fadeUp 1s 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }

    .input-row {
      width: 100%;
      display: flex;
      gap: 0;
      border: 1px solid var(--cream-dark);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    .waitlist input {
      flex: 1;
      padding: 14px 18px;
      background: transparent;
      border: none;
      outline: none;
      font-family: 'Jost', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: var(--ink);
      letter-spacing: 0.02em;
    }

    .waitlist input::placeholder {
      color: var(--ink-light);
    }

    .waitlist button {
      padding: 14px 22px;
      background: var(--ink);
      border: none;
      cursor: pointer;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 400;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--cream);
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }

    .waitlist button:hover {
      background: var(--accent);
    }

    .success-msg {
      display: none;
      font-size: 14px;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-align: center;
    }

    /* ── divider ── */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--cream-dark);
      margin-bottom: 32px;
      animation: fadeUp 1s 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* ── socials ── */
    .socials {
      display: flex;
      align-items: center;
      gap: 28px;
      animation: fadeUp 1s 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }

    .socials a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink-light);
      text-decoration: none;
      transition: color 0.2s, transform 0.2s;
    }

    .socials a:hover {
      color: var(--ink);
      transform: translateY(-2px);
    }

    .socials svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* ── footer ── */
    .footer {
      margin-top: 48px;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--ink-light);
      text-align: center;
      animation: fadeUp 1s 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
  </style>

</head>
<body>

  <script>
    // Draw Galaxy logo
    (function() {
      const canvas = document.getElementById('galaxy-canvas');
      const size = 300;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const centerX = size / 2;
      const centerY = size / 2;
      ctx.clearRect(0, 0, size, size);
      const colors = ['#FF6B9D', '#C471ED', '#12C2E9'];
      for (let armIndex = 0; armIndex < 3; armIndex++) {
        const armOffset = (Math.PI * 2 / 3) * armIndex;
        ctx.strokeStyle = colors[armIndex];
        ctx.lineWidth = 15;
        ctx.lineCap = 'round';
        ctx.beginPath();
        for (let i = 0; i < 100; i++) {
          const t = i / 100;
          const distance = t * 126;
          const angle = armOffset + t * Math.PI * 3;
          const x = centerX + Math.cos(angle) * distance;
          const y = centerY + Math.sin(angle) * distance;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    })();

    function handleJoin() {
      const input = document.getElementById('email-input');
      const msg = document.getElementById('success-msg');
      const email = input.value.trim();
      if (!email || !email.includes('@')) {
        input.closest('.input-row').style.borderColor = '#c0a080';
        setTimeout(() => input.closest('.input-row').style.borderColor = '', 1200);
        return;
      }
      // TODO: replace with Mailchimp POST action URL
      input.closest('.input-row').style.display = 'none';
      msg.style.display = 'block';
    }
  </script>-e
